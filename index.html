 <!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>MAKIMA M-DX · Accueil</title>
    <style>
        /* ===== BASE ROSE NÉON ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0005;
            color: #f0eef2;
            font-family: 'Poppins', 'Inter', 'Segoe UI', monospace;
            line-height: 1.5;
            padding: 2rem 1.5rem;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .perspective-wrapper {
            perspective: 1200px;
            transform-style: preserve-3d;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
            transform: translateZ(30px);
            transition: transform 0.2s ease-out;
        }

        .bg-3d {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            transform: translateZ(-80px) scale(1.2);
            transition: transform 0.15s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            will-change: transform;
        }

        .bg-3d::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 10%, #ff2a6d20, #0a0005 80%);
            opacity: 0.8;
        }

        .bg-3d::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(45deg, #ff2a6d08 0px, #ff2a6d08 2px, transparent 2px, transparent 8px);
            pointer-events: none;
        }

        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, #1a0010 0%, #050002 100%);
            opacity: 0.85;
            z-index: -1;
        }

        nav {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-bottom: 3rem;
            transform: translateZ(20px);
        }

        .nav-link {
            color: #ffc0e0;
            text-decoration: none;
            font-weight: 600;
            padding: 0.6rem 1.8rem;
            border-radius: 60px;
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.2);
            backdrop-filter: blur(10px);
            background: rgba(255, 42, 109, 0.15);
            border: 1px solid rgba(255, 42, 109, 0.4);
            cursor: pointer;
            letter-spacing: 1px;
        }

        .nav-link:hover, .nav-link.active {
            background: #ff2a6d;
            color: #0a0005;
            transform: translateY(-3px) translateZ(25px);
            box-shadow: 0 0 20px #ff2a6d, 0 12px 28px rgba(255, 42, 109, 0.4);
            border-color: transparent;
        }

        .glass-card {
            background: rgba(20, 8, 16, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 2rem;
            border: 1px solid rgba(255, 42, 109, 0.5);
            box-shadow: 0 25px 45px -15px rgba(0,0,0,0.5), 0 0 0 1px rgba(255, 42, 109, 0.2), inset 0 1px 0 rgba(255,255,255,0.05);
            transition: all 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.2);
        }

        .glass-card:hover {
            transform: translateY(-8px) translateZ(20px) rotateX(1deg) rotateY(1deg);
            border-color: #ff2a6d;
            box-shadow: 0 30px 50px -20px rgba(255, 42, 109, 0.5), 0 0 0 2px #ff2a6d;
        }

        .bot-image-frame {
            text-align: center;
            margin: 1.5rem 0;
            perspective: 400px;
        }

        .bot-image-frame img {
            max-width: 280px;
            width: 100%;
            border-radius: 28px;
            border: 3px solid #ff2a6d;
            box-shadow: 0 0 25px rgba(255, 42, 109, 0.5), 0 15px 25px rgba(0,0,0,0.4);
            transition: all 0.4s ease;
            transform: translateZ(10px);
        }

        .bot-image-frame img:hover {
            transform: scale(1.02) translateZ(20px) rotateY(2deg);
            box-shadow: 0 0 40px #ff2a6d;
            border-color: #ff88b0;
        }

        .contact-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1.2rem;
            margin: 1.8rem 0;
        }

        .contact-btn {
            background: rgba(255, 42, 109, 0.15);
            border: 1px solid rgba(255, 42, 109, 0.5);
            padding: 0.7rem 1.5rem;
            border-radius: 60px;
            color: #ffc0e0;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(4px);
        }

        .contact-btn:hover {
            background: #ff2a6d;
            color: #0a0005;
            transform: translateY(-3px);
            box-shadow: 0 0 18px #ff2a6d;
            border-color: #ff2a6d;
        }

        footer {
            text-align: center;
            margin-top: 4rem;
            padding-top: 2rem;
            border-top: 1px solid #ff2a6d30;
            font-size: 0.75rem;
            color: #ffa0c0;
        }

        @media (max-width: 700px) {
            body { padding: 1rem; }
            .contact-btn { padding: 0.5rem 1rem; font-size: 0.8rem; }
        }
    </style>
</head>
<body>
<div class="bg-3d" id="bg3d"></div>
<div class="perspective-wrapper">
    <div class="container" id="mainContainer">
        <nav>
            <a href="index.html" class="nav-link active">Accueil</a>
            <a href="pairing.html" class="nav-link">Connexion</a>
        </nav>

        <div class="glass-card">
            <div style="text-align: center;">
                <h1 style="color: #ff2a6d; font-size: 2.8rem; text-shadow: 0 0 15px #ff2a6d;">⚡ MAKIMA M-DX ⚡</h1>
                <p style="font-size: 1.2rem; margin: 0.5rem 0;">par <strong style="color: #ff88b0;">THE DARKNESS</strong></p>
            </div>

            <div class="bot-image-frame">
                <img src="https://files.catbox.moe/erp250.jpg" alt="MAKIMA M-DX">
            </div>

            <p style="text-align: center; margin: 1rem 0;">Bot WhatsApp nouvelle génération — appairage instantané, commandes modulaires, stabilité 24/7.</p>

            <div class="contact-grid">
                <a href="https://wa.me/237671281938" target="_blank" class="contact-btn">📱 WhatsApp (Dev)</a>
                <a href="https://whatsapp.com/channel/0029VbBz3AYBPzjd5is5mJ2W" target="_blank" class="contact-btn">📢 Chaîne X-MD</a>
                <a href="https://github.com/ghostvaldes02-" target="_blank" class="contact-btn">🐙 GitHub</a>
                <a href="mailto:darkness@example.com" class="contact-btn">✉️ Email</a>
            </div>
        </div>

        <footer>
            <p>© 2025 THE DARKNESS — MAKIMA M-DX | Rose Neon Dimension</p>
        </footer>
    </div>
</div>

<script>
    // Effet 3D souris
    const bg = document.getElementById('bg3d');
    const container = document.getElementById('mainContainer');
    document.addEventListener('mousemove', (e) => {
        const x = (e.clientX / window.innerWidth) * 30 - 15;
        const y = (e.clientY / window.innerHeight) * 20 - 10;
        bg.style.transform = `translateZ(-80px) translateX(${x * 0.4}px) translateY(${y * 0.3}px) scale(1.2)`;
        if (container) {
            container.style.transform = `translateZ(30px) rotateX(${y * 0.02}deg) rotateY(${x * 0.02}deg)`;
        }
    });
</script>
</body>
</html>
