 <!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>MAKIMA M-DX · Connexion</title>
    <style>
        /* ===== BASE ROSE NÉON ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0005;
            color: #f0eef2;
            font-family: 'Poppins', 'Inter', 'Segoe UI', monospace;
            line-height: 1.5;
            padding: 2rem 1.5rem;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .perspective-wrapper {
            perspective: 1200px;
            transform-style: preserve-3d;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
            transform: translateZ(30px);
            transition: transform 0.2s ease-out;
        }

        .bg-3d {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            transform: translateZ(-80px) scale(1.2);
            transition: transform 0.15s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            will-change: transform;
        }

        .bg-3d::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 10%, #ff2a6d20, #0a0005 80%);
            opacity: 0.8;
        }

        .bg-3d::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(45deg, #ff2a6d08 0px, #ff2a6d08 2px, transparent 2px, transparent 8px);
            pointer-events: none;
        }

        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, #1a0010 0%, #050002 100%);
            opacity: 0.85;
            z-index: -1;
        }

        nav {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-bottom: 3rem;
            transform: translateZ(20px);
        }

        .nav-link {
            color: #ffc0e0;
            text-decoration: none;
            font-weight: 600;
            padding: 0.6rem 1.8rem;
            border-radius: 60px;
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.2);
            backdrop-filter: blur(10px);
            background: rgba(255, 42, 109, 0.15);
            border: 1px solid rgba(255, 42, 109, 0.4);
            letter-spacing: 1px;
        }

        .nav-link:hover, .nav-link.active {
            background: #ff2a6d;
            color: #0a0005;
            transform: translateY(-3px) translateZ(25px);
            box-shadow: 0 0 20px #ff2a6d, 0 12px 28px rgba(255, 42, 109, 0.4);
            border-color: transparent;
        }

        .glass-card {
            background: rgba(20, 8, 16, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 2rem;
            border: 1px solid rgba(255, 42, 109, 0.5);
            box-shadow: 0 25px 45px -15px rgba(0,0,0,0.5), 0 0 0 1px rgba(255, 42, 109, 0.2), inset 0 1px 0 rgba(255,255,255,0.05);
            transition: all 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.2);
        }

        .glass-card:hover {
            transform: translateY(-8px) translateZ(20px) rotateX(1deg) rotateY(1deg);
            border-color: #ff2a6d;
            box-shadow: 0 30px 50px -20px rgba(255, 42, 109, 0.5), 0 0 0 2px #ff2a6d;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: #ffa0c0;
        }

        input {
            width: 100%;
            padding: 0.9rem 1rem;
            background: rgba(20, 8, 16, 0.9);
            border: 1px solid #ff2a6d;
            border-radius: 28px;
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #ff88b0;
            box-shadow: 0 0 20px rgba(255, 42, 109, 0.4);
            transform: scale(1.01);
        }

        button {
            background: linear-gradient(95deg, #ff2a6d, #d1004a);
            color: #0a0005;
            border: none;
            padding: 0.9rem 2rem;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.35s;
            width: 100%;
            letter-spacing: 1px;
        }

        button:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 8px 25px rgba(255, 42, 109, 0.6);
            background: #ff4d8a;
        }

        .code-display {
            margin-top: 2rem;
            padding: 1.2rem;
            background: rgba(0,0,0,0.5);
            border-radius: 28px;
            text-align: center;
            border: 1px solid #ff2a6d;
            backdrop-filter: blur(4px);
        }

        .code-number {
            font-size: 2.8rem;
            font-weight: bold;
            font-family: monospace;
            letter-spacing: 6px;
            color: #ff66a5;
            text-shadow: 0 0 12px #ff2a6d;
            word-break: break-all;
        }

        .copy-btn {
            background: rgba(255, 42, 109, 0.3);
            border: 1px solid #ff2a6d;
            border-radius: 60px;
            padding: 0.5rem 1.2rem;
            margin-top: 1rem;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-block;
            width: auto;
        }

        .copy-btn:hover {
            background: #ff2a6d;
            color: #0a0005;
            transform: scale(1.02);
        }

        .error {
            color: #ff88b0;
            margin-top: 1rem;
            text-align: center;
        }

        .loader {
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 3px solid #ff2a6d;
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        footer {
            text-align: center;
            margin-top: 4rem;
            padding-top: 2rem;
            border-top: 1px solid #ff2a6d30;
            font-size: 0.75rem;
            color: #ffa0c0;
        }

        @media (max-width: 700px) {
            body { padding: 1rem; }
            .code-number { font-size: 2rem; letter-spacing: 3px; }
        }
    </style>
</head>
<body>
<div class="bg-3d" id="bg3d"></div>
<div class="perspective-wrapper">
    <div class="container" id="mainContainer">
        <nav>
            <a href="index.html" class="nav-link">Accueil</a>
            <a href="pairing.html" class="nav-link active">Connexion</a>
        </nav>

        <div class="glass-card">
            <h2 style="color: #ff2a6d;">Générer votre code d'appairage</h2>
            <p>Entrez votre numéro WhatsApp <strong>avec indicatif pays</strong> (ex: 237671410035)</p>
            <div class="input-group">
                <label>Numéro WhatsApp</label>
                <input type="tel" id="phoneNumber" placeholder="237671410035" maxlength="15">
            </div>
            <button id="generateBtn">Obtenir le code</button>
            <div id="resultArea"></div>
        </div>

        <footer>
            <p>© 2025 THE DARKNESS — MAKIMA M-DX Pairing | Rose Neon Dimension</p>
        </footer>
    </div>
</div>

<script>
    const API_BASE_URL = 'http://95.111.252.213:19112';
    const generateBtn = document.getElementById('generateBtn');
    const phoneInput = document.getElementById('phoneNumber');
    const resultArea = document.getElementById('resultArea');

    function copyToClipboard(text) {
        navigator.clipboard.writeText(text).then(() => {
            alert('Code copié dans le presse-papier');
        }).catch(() => {
            alert('Impossible de copier');
        });
    }

    generateBtn.addEventListener('click', async () => {
        let rawNumber = phoneInput.value.trim();
        const cleanNumber = rawNumber.replace(/\D/g, '');
        if (cleanNumber.length < 8) {
            resultArea.innerHTML = `<div class="error">Numéro invalide (ex: 237671410035)</div>`;
            return;
        }

        resultArea.innerHTML = `<div class="code-display"><div class="loader"></div> Requête en cours...</div>`;

        try {
            const response = await fetch(`${API_BASE_URL}/pair?number=${cleanNumber}`);
            const data = await response.json();
            if (data.code) {
                const code = data.code;
                resultArea.innerHTML = `
                    <div class="code-display">
                        <div>Code d'appairage (valable 2 minutes) :</div>
                        <div class="code-number">${code}</div>
                        <button class="copy-btn" id="copyCodeBtn">Copier le code</button>
                        <div style="font-size:0.8rem; margin-top:0.8rem;">
                            Sur WhatsApp, vous recevrez une notification avec le nom <strong>DARKNESS</strong>.<br>
                            Saisissez ce code numérique pour connecter MAKIMA M-DX.
                        </div>
                    </div>
                `;
                document.getElementById('copyCodeBtn').addEventListener('click', () => copyToClipboard(code));
            } else if (data.error) {
                resultArea.innerHTML = `<div class="error">Erreur : ${data.error}</div>`;
            } else {
                resultArea.innerHTML = `<div class="error">Réponse inattendue du serveur.</div>`;
            }
        } catch (err) {
            console.error(err);
            resultArea.innerHTML = `<div class="error">Impossible de joindre le serveur. Vérifiez que le backend est actif.</div>`;
        }
    });

    const bg = document.getElementById('bg3d');
    const container = document.getElementById('mainContainer');
    document.addEventListener('mousemove', (e) => {
        const x = (e.clientX / window.innerWidth) * 30 - 15;
        const y = (e.clientY / window.innerHeight) * 20 - 10;
        bg.style.transform = `translateZ(-80px) translateX(${x * 0.4}px) translateY(${y * 0.3}px) scale(1.2)`;
        if (container) {
            container.style.transform = `translateZ(30px) rotateX(${y * 0.02}deg) rotateY(${x * 0.02}deg)`;
        }
    });
</script>
</body>
</html>
