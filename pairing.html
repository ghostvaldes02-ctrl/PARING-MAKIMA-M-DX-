 <!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>MAKIMA M-DX · Connexion sécurisée</title>
    <meta name="description" content="Connectez votre numéro WhatsApp à MAKIMA M-DX – authentification par code.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        /* ========== VARIABLES ========== */
        :root {
            --bg-dark: #0a0008;
            --glass-bg: rgba(25, 10, 20, 0.55);
            --neon-pink: #ff2a6d;
            --text-light: #f0eef2;
            --text-dim: #c0a0b8;
            --border-pink: rgba(255, 42, 109, 0.4);
            --transition: all 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        body.light {
            --bg-dark: #ffffff;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --neon-pink: #ff2a6d;
            --text-light: #1a0a12;
            --text-dim: #7a4a5e;
            --border-pink: rgba(255, 42, 109, 0.2);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg-dark);
            color: var(--text-light);
            font-family: 'Inter', monospace;
            padding: 2rem 1.5rem;
            min-height: 100vh;
            transition: background 0.3s, color 0.2s;
            position: relative;
            overflow-x: hidden;
        }
        canvas#vortexCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }
        .perspective-wrapper {
            perspective: 1200px;
            transform-style: preserve-3d;
            position: relative;
            z-index: 2;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
            transform: translateZ(30px);
            transition: transform 0.2s;
        }
        nav {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-bottom: 3rem;
            transform: translateZ(20px);
        }
        .nav-link {
            color: var(--text-dim);
            text-decoration: none;
            font-weight: 600;
            padding: 0.6rem 1.8rem;
            border-radius: 60px;
            transition: var(--transition);
            backdrop-filter: blur(8px);
            background: rgba(255,42,109,0.1);
            border: 1px solid var(--border-pink);
        }
        .nav-link:hover, .nav-link.active {
            background: var(--neon-pink);
            color: #0a0005;
            transform: translateY(-3px) translateZ(15px);
            box-shadow: 0 8px 20px rgba(255,42,109,0.4);
            border-color: transparent;
        }
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            border-radius: 32px;
            padding: 2rem;
            border: 1px solid rgba(255, 42, 109, 0.3);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2), 0 0 0 0.5px rgba(255, 255, 255, 0.05) inset;
            transition: var(--transition);
            max-width: 550px;
            margin: 0 auto;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeUp 0.7s ease forwards;
        }
        .glass-card:hover {
            transform: translateY(-5px) translateZ(10px);
            border-color: var(--neon-pink);
            box-shadow: 0 15px 40px rgba(255, 42, 109, 0.15), 0 0 0 1px rgba(255, 255, 255, 0.1) inset;
        }
        h2 { font-size: 2rem; color: var(--neon-pink); margin-bottom: 0.5rem; }
        .sub { margin-bottom: 2rem; color: var(--text-dim); }
        .input-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 500; color: var(--text-dim); }
        input {
            width: 100%;
            padding: 0.9rem 1rem;
            background: rgba(20, 8, 16, 0.7);
            backdrop-filter: blur(4px);
            border: 1px solid var(--border-pink);
            border-radius: 60px;
            color: var(--text-light);
            font-size: 1rem;
            transition: var(--transition);
        }
        input:focus {
            outline: none;
            border-color: var(--neon-pink);
            box-shadow: 0 0 15px rgba(255,42,109,0.3);
            transform: scale(1.01);
        }
        button {
            background: linear-gradient(95deg, var(--neon-pink), #d1004a);
            border: none;
            padding: 1rem;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition);
            width: 100%;
            color: white;
        }
        button:hover {
            transform: translateY(-2px) scale(1.01);
            box-shadow: 0 8px 20px rgba(255,42,109,0.5);
            background: #ff4d8a;
        }
        .code-display {
            margin-top: 2rem;
            padding: 1.2rem;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(8px);
            border-radius: 28px;
            text-align: center;
            border: 1px solid var(--neon-pink);
        }
        .code-number {
            font-size: 2.6rem;
            font-weight: 700;
            font-family: monospace;
            letter-spacing: 6px;
            color: #ff88b0;
            text-shadow: 0 0 8px var(--neon-pink);
            word-break: break-all;
        }
        .error {
            color: #ff88b0;
            margin-top: 1rem;
            text-align: center;
        }
        .loader {
            display: inline-block;
            width: 22px;
            height: 22px;
            border: 2px solid var(--neon-pink);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.7s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .theme-switch {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            z-index: 1000;
            background: var(--glass-bg);
            backdrop-filter: blur(8px);
            border: 1px solid var(--border-pink);
            border-radius: 60px;
            padding: 0.6rem;
            cursor: pointer;
            transition: var(--transition);
            font-size: 1.2rem;
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .theme-switch:hover { transform: scale(1.05); border-color: var(--neon-pink); }
        footer {
            text-align: center;
            margin-top: 3rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(255,42,109,0.2);
            font-size: 0.7rem;
            color: #a06a88;
            opacity: 0;
            animation: fadeUp 0.7s 0.2s ease forwards;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @media (max-width: 700px) { body { padding: 1rem; } .code-number { font-size: 1.8rem; letter-spacing: 3px; } }
    </style>
</head>
<body>
    <canvas id="vortexCanvas"></canvas>

    <div class="perspective-wrapper">
        <div class="container" id="mainContainer">
            <nav>
                <a href="index.html" class="nav-link">Accueil</a>
                <a href="pairing.html" class="nav-link active">Connexion</a>
            </nav>

            <div class="glass-card">
                <h2>Authentification par code</h2>
                <p class="sub">Entrez votre numéro WhatsApp avec l'indicatif pays (ex: 237671410035)</p>
                <div class="input-group">
                    <label>Numéro WhatsApp</label>
                    <input type="tel" id="phoneNumber" placeholder="237671410035" maxlength="15">
                </div>
                <button id="generateBtn">Générer le code d'appairage</button>
                <div id="resultArea"></div>
            </div>
            <footer>© 2025 THE DARKNESS — MAKIMA M-DX · connexion sécurisée</footer>
        </div>
    </div>

    <div class="theme-switch" id="themeToggle">🌙</div>

    <!-- Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // ---- EFFET VORTEX / DOUBLE HÉLICE (unique, pas de sphère) ----
        const canvas = document.getElementById('vortexCanvas');
        const renderer = new THREE.WebGLRenderer({ canvas, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 4, 18);
        camera.lookAt(0, 0, 0);

        // Groupe principal
        const vortexGroup = new THREE.Group();
        scene.add(vortexGroup);

        // Paramètres
        const particleCount = 4000;
        const turns = 3.5;      // nombre de tours
        const radius = 5.5;
        const height = 12;

        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        const colors = new Float32Array(particleCount * 3);

        for (let i = 0; i < particleCount; i++) {
            // Progression le long de l'hélice (0 à 1)
            const t = i / particleCount;
            const angle = t * Math.PI * 2 * turns;
            const y = (t - 0.5) * height;
            const r = radius * (1 - t * 0.3); // légère réduction vers le haut
            const x = Math.cos(angle) * r;
            const z = Math.sin(angle) * r;
            positions[i*3] = x;
            positions[i*3+1] = y;
            positions[i*3+2] = z;

            // Couleur : dégradé rose néon du bas (plus sombre) vers le haut (plus clair)
            const color = new THREE.Color();
            const hue = 0.92 + t * 0.05; // entre rose et magenta
            const lightness = 0.55 + t * 0.3;
            color.setHSL(hue, 1.0, lightness);
            colors[i*3] = color.r;
            colors[i*3+1] = color.g;
            colors[i*3+2] = color.b;
        }
        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        const particleMaterial = new THREE.PointsMaterial({ size: 0.12, vertexColors: true, transparent: true, opacity: 0.9, blending: THREE.AdditiveBlending });
        const helixPoints = new THREE.Points(geometry, particleMaterial);
        vortexGroup.add(helixPoints);

        // Ajouter une seconde hélice décalée pour un effet de double hélice
        const geometry2 = new THREE.BufferGeometry();
        const positions2 = new Float32Array(particleCount * 3);
        const colors2 = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            const t = i / particleCount;
            const angle = t * Math.PI * 2 * turns + Math.PI; // décalage de 180°
            const y = (t - 0.5) * height;
            const r = radius * (1 - t * 0.3);
            const x = Math.cos(angle) * r;
            const z = Math.sin(angle) * r;
            positions2[i*3] = x;
            positions2[i*3+1] = y;
            positions2[i*3+2] = z;
            const color = new THREE.Color();
            const hue = 0.92 + t * 0.05;
            const lightness = 0.55 + t * 0.3;
            color.setHSL(hue, 1.0, lightness);
            colors2[i*3] = color.r;
            colors2[i*3+1] = color.g;
            colors2[i*3+2] = color.b;
        }
        geometry2.setAttribute('position', new THREE.BufferAttribute(positions2, 3));
        geometry2.setAttribute('color', new THREE.BufferAttribute(colors2, 3));
        const helixPoints2 = new THREE.Points(geometry2, particleMaterial);
        vortexGroup.add(helixPoints2);

        // Ajouter des particules aléatoires en fond (effet nébuleuse)
        const bgParticleCount = 2000;
        const bgGeo = new THREE.BufferGeometry();
        const bgPositions = new Float32Array(bgParticleCount * 3);
        for (let i = 0; i < bgParticleCount; i++) {
            // distribution sphérique large
            const radiusBg = 9 + Math.random() * 3;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            bgPositions[i*3] = radiusBg * Math.sin(phi) * Math.cos(theta);
            bgPositions[i*3+1] = radiusBg * Math.sin(phi) * Math.sin(theta);
            bgPositions[i*3+2] = radiusBg * Math.cos(phi);
        }
        bgGeo.setAttribute('position', new THREE.BufferAttribute(bgPositions, 3));
        const bgMaterial = new THREE.PointsMaterial({ color: 0xff66aa, size: 0.06, transparent: true, opacity: 0.3, blending: THREE.AdditiveBlending });
        const bgPoints = new THREE.Points(bgGeo, bgMaterial);
        vortexGroup.add(bgPoints);

        // Animation : rotation lente + mouvement vertical sinusoïdal
        let time = 0;
        function animateVortex() {
            requestAnimationFrame(animateVortex);
            time += 0.008;
            // Rotation douce sur Y
            vortexGroup.rotation.y = time * 0.4;
            // Légère oscillation sur X
            vortexGroup.rotation.x = Math.sin(time * 0.2) * 0.15;
            // Translation verticale très lente
            vortexGroup.position.y = Math.sin(time * 0.3) * 0.2;
            renderer.render(scene, camera);
        }
        animateVortex();

        // Parallaxe à la souris (effet de profondeur)
        document.addEventListener('mousemove', (e) => {
            const mouseX = (e.clientX / window.innerWidth) * 2 - 1;
            const mouseY = (e.clientY / window.innerHeight) * 2 - 1;
            vortexGroup.rotation.y += mouseX * 0.003;
            vortexGroup.rotation.x += mouseY * 0.002;
        });

        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // ========== THÈME ET PAIRING (inchangés) ==========
        const themeToggle = document.getElementById('themeToggle');
        const body = document.body;
        const savedTheme = localStorage.getItem('makima-theme');
        if (savedTheme === 'light') {
            body.classList.add('light');
            themeToggle.innerHTML = '☀️';
        }
        themeToggle.addEventListener('click', () => {
            body.classList.toggle('light');
            if (body.classList.contains('light')) {
                localStorage.setItem('makima-theme', 'light');
                themeToggle.innerHTML = '☀️';
            } else {
                localStorage.setItem('makima-theme', 'dark');
                themeToggle.innerHTML = '🌙';
            }
        });

        const API_BASE_URL = 'http://95.111.252.213:19112'; // ← À MODIFIER
        const generateBtn = document.getElementById('generateBtn');
        const phoneInput = document.getElementById('phoneNumber');
        const resultArea = document.getElementById('resultArea');

        generateBtn.addEventListener('click', async () => {
            let rawNumber = phoneInput.value.trim();
            const cleanNumber = rawNumber.replace(/\D/g, '');
            if (cleanNumber.length < 8) {
                resultArea.innerHTML = `<div class="error">❌ Numéro invalide (ex: 237671410035)</div>`;
                return;
            }
            resultArea.innerHTML = `<div class="code-display"><div class="loader"></div> Génération en cours...</div>`;
            try {
                const response = await fetch(`${API_BASE_URL}/pair?number=${cleanNumber}`);
                const data = await response.json();
                if (data.code) {
                    resultArea.innerHTML = `
                        <div class="code-display">
                            <div>✅ Code d'appairage (valable 2 minutes)</div>
                            <div class="code-number">${data.code}</div>
                            <button class="copy-btn" style="background:transparent; border:1px solid var(--neon-pink); border-radius:60px; padding:0.5rem 1rem; margin-top:0.8rem; cursor:pointer; color:var(--neon-pink);" id="copyCodeBtn">Copier le code</button>
                            <div style="font-size:0.8rem; margin-top:0.8rem;">Saisissez ce code dans WhatsApp pour activer MAKIMA M-DX.</div>
                        </div>
                    `;
                    document.getElementById('copyCodeBtn')?.addEventListener('click', () => {
                        navigator.clipboard.writeText(data.code);
                        alert('Code copié !');
                    });
                } else {
                    resultArea.innerHTML = `<div class="error">❌ Erreur : ${data.error || 'Réponse invalide'}</div>`;
                }
            } catch (err) {
                console.error(err);
                resultArea.innerHTML = `<div class="error">❌ Impossible de contacter le serveur. Vérifiez que le backend est actif.</div>`;
            }
        });
    </script>
</body>
</html>
