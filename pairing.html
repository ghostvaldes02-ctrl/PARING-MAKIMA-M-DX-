 <!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>MAKIMA M-DX · Connexion sécurisée</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0008;
            --glass-bg: rgba(25, 10, 20, 0.55);
            --neon-pink: #ff2a6d;
            --neon-glow: 0 0 12px rgba(255, 42, 109, 0.4);
            --text-light: #f0eef2;
            --text-dim: #c0a0b8;
            --border-pink: rgba(255, 42, 109, 0.4);
            --transition: all 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg-dark);
            color: var(--text-light);
            font-family: 'Inter', monospace;
            padding: 2rem 1.5rem;
            min-height: 100vh;
        }
        .perspective-wrapper { perspective: 1200px; transform-style: preserve-3d; }
        .container { max-width: 1000px; margin: 0 auto; position: relative; z-index: 2; transform: translateZ(30px); transition: transform 0.2s; }
        .bg-3d { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; transform: translateZ(-80px) scale(1.2); transition: transform 0.15s; will-change: transform; }
        .bg-3d::before { content: ""; position: absolute; inset: 0; background: radial-gradient(circle at 30% 20%, #ff2a6d20, #0a0008 90%); }
        .bg-3d::after { content: ""; position: absolute; inset: 0; background: repeating-linear-gradient(45deg, #ff2a6d08 0px, #ff2a6d08 2px, transparent 2px, transparent 8px); pointer-events: none; }
        body::after { content: ""; position: fixed; inset: 0; background: radial-gradient(ellipse, #1a0010 0%, #050002 100%); opacity: 0.9; z-index: -1; }

        /* Navigation à deux liens */
        nav { display: flex; justify-content: center; gap: 2rem; margin-bottom: 3rem; transform: translateZ(20px); }
        .nav-link { color: var(--text-dim); text-decoration: none; font-weight: 600; padding: 0.6rem 1.8rem; border-radius: 60px; transition: var(--transition); backdrop-filter: blur(8px); background: rgba(255,42,109,0.1); border: 1px solid var(--border-pink); }
        .nav-link:hover, .nav-link.active { background: var(--neon-pink); color: #0a0005; transform: translateY(-3px) translateZ(15px); box-shadow: 0 8px 20px rgba(255,42,109,0.4); border-color: transparent; }

        /* Glassmorphism card */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            border-radius: 32px;
            padding: 2rem;
            border: 1px solid rgba(255, 42, 109, 0.3);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2), 0 0 0 0.5px rgba(255, 255, 255, 0.05) inset;
            transition: var(--transition);
        }
        .glass-card:hover {
            transform: translateY(-5px) translateZ(10px);
            border-color: var(--neon-pink);
            box-shadow: 0 15px 40px rgba(255, 42, 109, 0.15), 0 0 0 1px rgba(255, 255, 255, 0.1) inset;
        }

        h2 { font-size: 1.8rem; font-weight: 600; color: var(--neon-pink); margin-bottom: 0.5rem; letter-spacing: -0.3px; }
        .input-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 500; color: var(--text-dim); font-size: 0.85rem; }
        input { width: 100%; padding: 0.9rem 1rem; background: rgba(20, 8, 16, 0.7); backdrop-filter: blur(4px); border: 1px solid var(--border-pink); border-radius: 28px; color: #fff; font-size: 1rem; transition: var(--transition); }
        input:focus { outline: none; border-color: var(--neon-pink); box-shadow: 0 0 15px rgba(255,42,109,0.3); transform: scale(1.01); }
        button { background: linear-gradient(95deg, var(--neon-pink), #b00048); border: none; padding: 0.9rem 2rem; border-radius: 60px; font-weight: 700; font-size: 1rem; cursor: pointer; transition: var(--transition); width: 100%; color: #0a0005; letter-spacing: 0.5px; }
        button:hover { transform: translateY(-2px) scale(1.01); box-shadow: 0 8px 20px rgba(255,42,109,0.5); background: #ff4d8a; }
        .code-display { margin-top: 2rem; padding: 1.2rem; background: rgba(0,0,0,0.4); backdrop-filter: blur(8px); border-radius: 28px; text-align: center; border: 1px solid var(--neon-pink); }
        .code-number { font-size: 2.6rem; font-weight: 700; font-family: monospace; letter-spacing: 6px; color: #ff88b0; text-shadow: 0 0 8px var(--neon-pink); }
        .error { color: #ff88b0; margin-top: 1rem; text-align: center; font-size: 0.9rem; }
        .loader { display: inline-block; width: 22px; height: 22px; border: 2px solid var(--neon-pink); border-radius: 50%; border-top-color: #fff; animation: spin 0.7s linear infinite; margin-right: 8px; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }
        footer { text-align: center; margin-top: 3rem; padding-top: 1.5rem; border-top: 1px solid rgba(255,42,109,0.2); font-size: 0.7rem; color: #a06a88; }
        @media (max-width: 700px) { body { padding: 1rem; } .code-number { font-size: 1.8rem; letter-spacing: 3px; } }
    </style>
</head>
<body>
<div class="bg-3d" id="bg3d"></div>
<div class="perspective-wrapper">
    <div class="container" id="mainContainer">
        <nav>
            <a href="index.html" class="nav-link">Accueil</a>
            <a href="pairing.html" class="nav-link active">Connexion</a>
        </nav>

        <div class="glass-card">
            <h2>Authentification par code</h2>
            <p style="margin-bottom: 1.2rem; color: var(--text-dim);">Saisissez votre numéro WhatsApp avec l'indicatif pays.</p>
            <div class="input-group">
                <label>Numéro de téléphone</label>
                <input type="tel" id="phoneNumber" placeholder="ex: 237671410035" maxlength="15">
            </div>
            <button id="generateBtn">Générer le code d'appairage</button>
            <div id="resultArea"></div>
        </div>
        <footer>© 2025 THE DARKNESS — infrastructure sécurisée</footer>
    </div>
</div>

<script>
    (function(){
        // Effet 3D souris
        const bg = document.getElementById('bg3d');
        const container = document.getElementById('mainContainer');
        if(bg && container){
            document.addEventListener('mousemove', (e) => {
                const x = (e.clientX / window.innerWidth) * 30 - 15;
                const y = (e.clientY / window.innerHeight) * 20 - 10;
                bg.style.transform = `translateZ(-80px) translateX(${x*0.3}px) translateY(${y*0.2}px) scale(1.2)`;
                container.style.transform = `translateZ(30px) rotateX(${y*0.015}deg) rotateY(${x*0.015}deg)`;
            });
        }

        // Configuration de l'API backend (à modifier avec l'URL réelle de ton serveur)
        const API_BASE_URL = 'https://ton-backend-makima.xyz'; // ⚠️ REMPLACER PAR L'URL DE TON BACKEND

        const generateBtn = document.getElementById('generateBtn');
        const phoneInput = document.getElementById('phoneNumber');
        const resultArea = document.getElementById('resultArea');

        generateBtn.addEventListener('click', async () => {
            const raw = phoneInput.value.trim();
            const cleanNumber = raw.replace(/\D/g, '');
            if(cleanNumber.length < 8){
                resultArea.innerHTML = `<div class="error">Numéro invalide (minimum 8 chiffres, ex: 237671410035)</div>`;
                return;
            }
            resultArea.innerHTML = `<div class="code-display"><div class="loader"></div> Requête en cours...</div>`;
            try {
                const response = await fetch(`${API_BASE_URL}/pair?number=${cleanNumber}`);
                const data = await response.json();
                if(data.code){
                    resultArea.innerHTML = `
                        <div class="code-display">
                            <div style="margin-bottom: 0.5rem;">Code d'appairage (valable 120 secondes)</div>
                            <div class="code-number">${data.code}</div>
                            <div style="font-size:0.75rem; margin-top:0.8rem;">Saisissez ce code dans WhatsApp pour activer MAKIMA M-DX.</div>
                        </div>
                    `;
                } else if(data.error){
                    resultArea.innerHTML = `<div class="error">Erreur serveur : ${data.error}</div>`;
                } else {
                    resultArea.innerHTML = `<div class="error">Réponse inattendue de l'API.</div>`;
                }
            } catch(err) {
                console.error(err);
                resultArea.innerHTML = `<div class="error">Impossible de contacter le serveur. Vérifiez que le backend est en ligne.</div>`;
            }
        });
    })();
</script>
</body>
</html>
